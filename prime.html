<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>میدان تیراندازی اعداد اول | حالت ژیروسکوپ گوشی</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #111;
            touch-action: none; /* بهبود تجربه لمسی */
        }
        
        /* پنل‌های بالایی */
        #ui-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #00ffcc;
            padding: 12px 24px;
            border-radius: 40px;
            text-align: center;
            border: 2px solid #00ffcc;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        #instruction {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        #feedback {
            font-size: 14px;
            color: #ffaa66;
            min-height: 20px;
        }
        
        #score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: #ffd700;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ffd700;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        
        /* دکمه ژیروسکوپ (بالا سمت چپ) */
        #gyro-toggle {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: #1e2a3a;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 25;
            font-family: inherit;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0,255,204,0.3);
        }
        #gyro-toggle.active {
            background: #00ffcc;
            color: #1e2a3a;
            border-color: #ffffff;
            box-shadow: 0 0 20px #00ffcc;
        }
        #gyro-toggle:active {
            transform: scale(0.96);
        }
        
        /* دکمه شلیک لمسی (فقط در حالت ژیروسکوپ ظاهر می‌شود) */
        #shoot-btn {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #e94560, #b81c3c);
            border: 3px solid #ffd966;
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            z-index: 25;
            box-shadow: 0 0 20px rgba(233,69,96,0.8);
            display: none; /* پیش‌فرض مخفی */
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            touch-action: manipulation;
            backdrop-filter: blur(2px);
            font-family: monospace;
        }
        #shoot-btn:active {
            transform: scale(0.92);
            background: radial-gradient(circle at 30% 30%, #ff3355, #a01030);
            box-shadow: 0 0 30px #ff004c;
        }
        
        /* کراس‌هیر (دایره وسط) */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            border: 2px solid #00ffcc;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 15;
            background: rgba(0, 255, 204, 0.25);
            box-shadow: 0 0 10px #00ffcc;
            transition: transform 0.05s linear;
        }
        
        /* صفحه شروع بازی */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        #start-btn {
            font-size: 32px;
            padding: 16px 48px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 0 20px #e94560;
            transition: transform 0.2s;
            font-weight: bold;
        }
        #start-btn:active {
            transform: scale(0.96);
        }
        
        @media (max-width: 700px) {
            #instruction { font-size: 14px; }
            #score-board { font-size: 14px; padding: 8px 16px; top: 12px; right: 12px; }
            #ui-container { padding: 6px 16px; top: 12px; white-space: normal; width: 90%; text-align: center; }
            #gyro-toggle { padding: 8px 16px; font-size: 13px; bottom: 20px; left: 15px; }
            #shoot-btn { width: 70px; height: 70px; font-size: 26px; bottom: 25px; right: 20px; }
        }
        
        .instruction-tip {
            font-size: 14px;
            color: #aaa;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="blocker">
        <button id="start-btn">🎯 شروع بازی (۱ تا ۱۰۰۰)</button>
        <p style="font-size: 18px;">با ماوس نگاه کنید | <strong style="color:#00ffcc;">Enter</strong> شلیک</p>
        <p style="font-size: 15px; color: #bbb;">📱 فعال‌سازی <strong style="color:#ffaa44;">حالت ژیروسکوپ</strong> برای گوشی + دکمه شلیک لمسی</p>
        <p class="instruction-tip">✅ شلیک صحیح = +۱۰ | ❌ شلیک غلط = -۵</p>
    </div>

    <div id="ui-container">
        <div id="instruction">در حال آماده‌سازی...</div>
        <div id="feedback"></div>
    </div>
    
    <div id="score-board">
        <div id="batch-display">دسته: ۱ از ۱۰</div>
        <div id="score-display">امتیاز: ۰</div>
    </div>
    
    <div id="crosshair"></div>
    
    <!-- دکمه‌های جدید -->
    <button id="gyro-toggle">🧭 حالت ژیروسکوپ</button>
    <button id="shoot-btn">🔫</button>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- سیستم صوتی (Web Audio) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'shoot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'levelUp') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(500, now + 0.1);
                osc.frequency.setValueAtTime(600, now + 0.2);
                osc.frequency.setValueAtTime(800, now + 0.3);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            }
        }

        // --- متغیرهای اصلی بازی ---
        let score = 0;
        let gameActive = false;       // بازی شروع شده (بلاکر بسته شده)
        let gyroActive = false;       // وضعیت ژیروسکوپ
        let cameraGroup;              // گروه دوربین که PointerLockControls روی آن اعمال می‌شود
        let controls;
        
        // عناصر DOM
        const scoreDisplay = document.getElementById('score-display');
        const batchDisplay = document.getElementById('batch-display');
        const instructionEl = document.getElementById('instruction');
        const feedbackEl = document.getElementById('feedback');
        const crosshair = document.getElementById('crosshair');
        const blocker = document.getElementById('blocker');
        const startBtn = document.getElementById('start-btn');
        const gyroToggleBtn = document.getElementById('gyro-toggle');
        const shootButton = document.getElementById('shoot-btn');
        
        // وضعیت بازی
        let currentBatchIndex = 0;
        const totalBatches = 10;
        let numbers = [];      // اشیاء سه بعدی اعداد
        let targets = [];      // مراحل غربال
        let currentStep = 0;
        let batchStart = 1, batchEnd = 100;
        let isTransitioning = false;
        
        // reference به scene و camera
        let scene, camera, renderer;
        let raycaster;
        
        // --- توابع امتیاز ---
        function updateScore(amount) {
            score += amount;
            scoreDisplay.innerText = `امتیاز: ${score}`;
            const boardDiv = document.getElementById('score-board');
            boardDiv.style.transform = 'scale(1.1)';
            if (amount > 0) boardDiv.style.borderColor = '#00ffcc';
            else boardDiv.style.borderColor = '#ff3366';
            setTimeout(() => {
                boardDiv.style.transform = 'scale(1)';
                boardDiv.style.borderColor = '#ffd700';
            }, 300);
        }
        
        // --- غربال اعداد اول تا max ---
        function getPrimesUpTo(max) {
            const sieve = new Array(max + 1).fill(true);
            const primes = [];
            for (let p = 2; p <= max; p++) {
                if (sieve[p]) {
                    primes.push(p);
                    for (let i = p * p; i <= max; i += p) sieve[i] = false;
                }
            }
            return primes;
        }
        
        // پاک کردن اهداف قبلی
        function clearBoard() {
            numbers.forEach(target => {
                scene.remove(target);
                target.geometry.dispose();
                if (target.material.map) target.material.map.dispose();
                target.material.dispose();
            });
            numbers = [];
        }
        
        // ساخت بافت عدد
        function createNumberTexture(num) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0f3460';
            ctx.beginPath();
            ctx.arc(128, 128, 120, 0, Math.PI * 2);
            ctx.fill();
            ctx.lineWidth = 12;
            ctx.strokeStyle = '#e94560';
            ctx.stroke();
            ctx.fillStyle = '#ffffff';
            const fontSize = num >= 100 ? 70 : 90;
            ctx.font = `bold ${fontSize}px "Tahoma", "Segoe UI"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(num, 128, 140);
            return new THREE.CanvasTexture(canvas);
        }
        
        // بارگذاری دسته (هر دسته ۱۰۰ عدد)
        function loadBatch(index) {
            clearBoard();
            isTransitioning = false;
            currentBatchIndex = index;
            batchStart = currentBatchIndex * 100 + 1;
            batchEnd = (currentBatchIndex + 1) * 100;
            batchDisplay.innerText = `دسته: ${currentBatchIndex + 1} از ${totalBatches}`;
            feedbackEl.innerText = "";
            
            const radius = 14;
            for (let i = batchStart; i <= batchEnd; i++) {
                const texture = createNumberTexture(i);
                const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
                const geometry = new THREE.CircleGeometry(0.55, 32);
                const targetBoard = new THREE.Mesh(geometry, material);
                
                const localIndex = i - batchStart;
                const row = Math.floor(localIndex / 10);
                const col = localIndex % 10;
                const angle = (col / 9) * (Math.PI * 0.8) - (Math.PI * 0.4);
                targetBoard.position.x = Math.sin(angle) * radius;
                targetBoard.position.y = 6.2 - (row * 1.08);
                targetBoard.position.z = -Math.cos(angle) * radius;
                targetBoard.lookAt(0, targetBoard.position.y, 0);
                targetBoard.userData = { number: i, isHit: false };
                scene.add(targetBoard);
                numbers.push(targetBoard);
            }
            
            setupTargetsForBatch();
            currentStep = 0;
            updateStepLogic();
        }
        
        function setupTargetsForBatch() {
            targets = [];
            if (batchStart === 1) {
                targets.push({ divisor: 1, text: "🎯 گام ۱: عدد ۱ را شلیک کن (نه اول است نه مرکب)" });
            }
            const maxDivisor = Math.floor(Math.sqrt(batchEnd));
            const primes = getPrimesUpTo(maxDivisor);
            primes.forEach(p => {
                targets.push({ divisor: p, text: `🎲 مضارب ${p} را شلیک کن (اعدادی که خط نخورده‌اند)` });
            });
            targets.push({ divisor: 'done', text: `✨ عالی! اعداد باقی‌مانده در این دسته، اول هستند.` });
        }
        
        function countRemainingForCurrentStep() {
            let count = 0;
            const currentDivisor = targets[currentStep].divisor;
            if (currentDivisor === 'done') return 0;
            numbers.forEach(target => {
                if (!target.userData.isHit) {
                    const num = target.userData.number;
                    if (currentDivisor === 1 && num === 1) count++;
                    else if (currentDivisor !== 1 && num % currentDivisor === 0 && num !== currentDivisor) count++;
                }
            });
            return count;
        }
        
        function updateStepLogic() {
            if (isTransitioning) return;
            if (targets[currentStep].divisor === 'done') {
                handleBatchComplete();
                return;
            }
            const remaining = countRemainingForCurrentStep();
            if (remaining === 0) {
                currentStep++;
                updateStepLogic();
            } else {
                instructionEl.innerText = targets[currentStep].text;
            }
        }
        
        function handleBatchComplete() {
            isTransitioning = true;
            playSound('levelUp');
            instructionEl.innerText = targets[currentStep].text;
            feedbackEl.innerText = "🏆 پاکسازی دسته! دسته بعدی در حال بارگیری...";
            feedbackEl.style.color = '#ffd700';
            numbers.forEach(target => {
                if (!target.userData.isHit) {
                    target.material.color.setHex(0x00ffcc);
                }
            });
            setTimeout(() => {
                if (currentBatchIndex + 1 < totalBatches) {
                    loadBatch(currentBatchIndex + 1);
                } else {
                    instructionEl.innerText = "🎉 تبریک! همه اعداد اول ۱ تا ۱۰۰۰ یافت شد! 🎉";
                    feedbackEl.innerText = `امتیاز نهایی: ${score}`;
                    isTransitioning = true; // بازی تمام شد
                }
            }, 3500);
        }
        
        // --- منطق شلیک (هم برای کیبورد و هم دکمه لمسی) ---
        function fireWeapon() {
            if (!gameActive || isTransitioning) return;
            if (targets[currentStep]?.divisor === 'done') return;
            
            // افکت انیمیشن کراس‌هیر
            crosshair.style.transform = 'translate(-50%, -50%) scale(1.6)';
            setTimeout(() => crosshair.style.transform = 'translate(-50%, -50%) scale(1)', 120);
            playSound('shoot');
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(numbers);
            if (intersects.length === 0) return;
            
            const object = intersects[0].object;
            if (object.userData.isHit) return;
            
            const num = object.userData.number;
            const currentDivisor = targets[currentStep].divisor;
            let isValidHit = false;
            if (currentDivisor === 1 && num === 1) isValidHit = true;
            else if (currentDivisor !== 1 && num % currentDivisor === 0 && num !== currentDivisor) isValidHit = true;
            
            if (isValidHit) {
                playSound('correct');
                updateScore(10);
                object.userData.isHit = true;
                object.material.color.setHex(0xff3333);
                feedbackEl.innerText = `✓ درست! عدد ${num} خط خورد (+۱۰)`;
                feedbackEl.style.color = '#00ffcc';
                // افتادن و ناپدید شدن
                let fallInterval = setInterval(() => {
                    object.rotation.x -= 0.1;
                    object.position.y -= 0.05;
                    if (object.material.map) object.material.opacity -= 0.05;
                    if (object.position.y < -2 || (object.material.opacity || 1) <= 0.05) {
                        clearInterval(fallInterval);
                        object.visible = false;
                    }
                }, 16);
                if (countRemainingForCurrentStep() === 0) {
                    currentStep++;
                    updateStepLogic();
                }
            } else {
                playSound('wrong');
                updateScore(-5);
                feedbackEl.innerText = `✗ اشتباه! ${num} برای مرحله فعلی نیست (-۵)`;
                feedbackEl.style.color = '#ff6666';
                const startX = object.position.x;
                let shakeCount = 0;
                const shakeIt = setInterval(() => {
                    object.position.x = startX + (Math.random() - 0.5) * 0.2;
                    shakeCount++;
                    if (shakeCount > 8) {
                        clearInterval(shakeIt);
                        object.position.x = startX;
                    }
                }, 20);
            }
        }
        
        // --- توابع کنترل ژیروسکوپ (DeviceOrientation) ---
        let orientationListener = null;
        let initialOrientationFixed = false;
        let baseGamma = 0, baseBeta = 0;
        
        function startGyroMode() {
            if (!gameActive) {
                // اگر بازی هنوز شروع نشده، فقط پرچم فعال می‌شود و بعد از start لاگ می‌کنیم
                gyroActive = true;
                gyroToggleBtn.classList.add('active');
                shootButton.style.display = 'flex';
                if (controls && controls.isLocked) controls.unlock();
                return;
            }
            if (orientationListener) window.removeEventListener('deviceorientation', orientationListener);
            gyroActive = true;
            gyroToggleBtn.classList.add('active');
            shootButton.style.display = 'flex';
            // قفل ماوس را غیرفعال کن
            if (controls && controls.isLocked) controls.unlock();
            
            // تنظیم اولیه: صفر کردن offset (اختیاری)
            initialOrientationFixed = false;
            
            orientationListener = (event) => {
                if (!gyroActive || !gameActive) return;
                // gamma: چپ-راست (yaw)   beta: جلو-عقب (pitch)
                let gamma = event.gamma || 0;   // -90 تا 90
                let beta = event.beta || 0;     // -180 تا 180
                // محدود کردن pitch برای جلوگیری از وارونگی دوربین
                let yaw = (gamma / 90) * Math.PI / 1.8;
                let pitch = (beta / 90) * Math.PI / 2.2;
                pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitch));
                if (!initialOrientationFixed && cameraGroup) {
                    initialOrientationFixed = true;
                }
                if (cameraGroup) {
                    cameraGroup.rotation.order = 'YXZ';
                    cameraGroup.rotation.y = -yaw;   // چپ و راست
                    cameraGroup.rotation.x = -pitch; // بالا و پایین
                }
            };
            window.addEventListener('deviceorientation', orientationListener);
            // برای ios درخواست دسترسی قبلاً در toggle گرفته شده
            feedbackEl.innerText = "🧭 حالت ژیروسکوپ فعال | دکمه شلیک پایین صفحه";
            feedbackEl.style.color = "#aaffdd";
        }
        
        function stopGyroMode() {
            if (orientationListener) {
                window.removeEventListener('deviceorientation', orientationListener);
                orientationListener = null;
            }
            gyroActive = false;
            gyroToggleBtn.classList.remove('active');
            shootButton.style.display = 'none';
            if (gameActive && controls && !controls.isLocked && !gyroActive) {
                // تلاش برای قفل مجدد ماوس (در صورتی که کاربر روی صفحه کلیک کند فعال می‌شود)
                // اما برای راحتی، فقط پرچم را آپدیت می‌کنیم
            }
            feedbackEl.innerText = "🖱️ حالت ماوس/کیبورد فعال شد";
            setTimeout(() => { if(!gyroActive) feedbackEl.innerText = ""; }, 1500);
        }
        
        // درخواست دسترسی ژیروسکوپ (مخصوص iOS)
        async function requestGyroPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        startGyroMode();
                    } else {
                        alert("برای استفاده از ژیروسکوپ، دسترسی لازم است.");
                    }
                } catch (err) {
                    alert("دسترسی به ژیروسکوپ داده نشد.");
                }
            } else {
                startGyroMode();
            }
        }
        
        // --- راه‌اندازی سه بعدی و کنترل ---
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 10, 38);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            controls = new PointerLockControls(camera, document.body);
            cameraGroup = controls.getObject();  // گروهی که دوربین به آن متصل است
            scene.add(cameraGroup);
            raycaster = new THREE.Raycaster();
            
            // رویدادهای قفل
            controls.addEventListener('lock', () => {
                if (!gyroActive) blocker.style.display = 'none';
            });
            controls.addEventListener('unlock', () => {
                if (!gyroActive && gameActive) blocker.style.display = 'flex';
                else if (gyroActive) blocker.style.display = 'none';
            });
            
            // شروع بازی با دکمه Start
            startBtn.addEventListener('click', () => {
                initAudio();
                gameActive = true;
                blocker.style.display = 'none';
                if (gyroActive) {
                    // اگر قبلاً ژیروسکوپ فعال شده بود، مطمئن شو ماوس قفل نشود و ژیرو کار کند
                    if (controls.isLocked) controls.unlock();
                    startGyroMode(); // ری‌استارت listener
                } else {
                    controls.lock();
                }
                if (!numbers.length) loadBatch(0);
            });
            
            // دکمه شلیک لمسی
            shootButton.addEventListener('click', (e) => {
                e.preventDefault();
                if (gameActive && !isTransitioning && gyroActive) {
                    fireWeapon();
                } else if (gameActive && !gyroActive && !isTransitioning) {
                    // در حالت عادی هم بشود با دکمه شلیک کرد (اختیاری)
                    fireWeapon();
                }
            });
            
            // دکمه ژیروسکوپ
            gyroToggleBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                initAudio();
                if (!gyroActive) {
                    // فعال‌سازی ژیروسکوپ
                    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                        await requestGyroPermission();
                    } else {
                        startGyroMode();
                    }
                } else {
                    stopGyroMode();
                }
            });
            
            // کلید Enter برای شلیک (دسکتاپ)
            window.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' && gameActive && !isTransitioning) {
                    fireWeapon();
                }
            });
            
            // بارگذاری اولین دسته بعد از شروع (ولی loadBatch در شروع صدا می‌شود)
            loadBatch(0);
            // حلقه رندر
            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }
        
        // شروع کل سیستم
        initThree();
        
        // نکته: نمایش یا عدم نمایش دکمه شلیک بر اساس وضعیت اولیه
        shootButton.style.display = 'none';
        // اگر دستگاه موبایل باشد، می‌توانیم راهنمایی کنیم ولی تصمیم با کاربر
        console.log("بازی آماده | حالت ژیروسکوپ با دکمه پایین صفحه");
    </script>
</body>
</html>
