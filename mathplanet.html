<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>فضای ریاضی ۳۶۰ درجه | نسخه پیشرفته</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #01010a;
            touch-action: none;
        }
        
        /* افکت شیشه‌ای برای المان‌های رابط کاربری */
        .glass-panel {
            background: rgba(10, 15, 40, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .glass-btn {
            background: linear-gradient(135deg, rgba(90, 62, 138, 0.8), rgba(60, 30, 100, 0.8));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(170, 136, 255, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .glass-btn:hover {
            background: linear-gradient(135deg, rgba(110, 82, 168, 0.9), rgba(80, 50, 130, 0.9));
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(170, 136, 255, 0.4);
        }

        .opt-btn {
            background: rgba(30, 40, 80, 0.8);
            border: 1px solid rgba(100, 150, 255, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .opt-btn:hover, .opt-btn:active {
            background: rgba(60, 100, 200, 0.9);
            border-color: rgba(150, 200, 255, 0.8);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
        }

        /* نشانگر وسط صفحه */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 50, 100, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 50, 100, 0.5), inset 0 0 10px rgba(255, 50, 100, 0.3);
            z-index: 150;
            pointer-events: none;
            transition: all 0.2s ease;
        }
        
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px #fff;
        }
        
        .crosshair-active {
            width: 45px !important;
            height: 45px !important;
            border-color: rgba(50, 255, 150, 0.9) !important;
            box-shadow: 0 0 25px rgba(50, 255, 150, 0.6), inset 0 0 15px rgba(50, 255, 150, 0.4) !important;
            transform: translate(-50%, -50%) rotate(45deg) !important;
        }

        /* انیمیشن ورود باکس سوال */
        @keyframes popIn {
            0% { opacity: 0; transform: translateX(-50%) scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
        }
        
        .show-question {
            display: flex !important;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .pointer-events-auto { 
            pointer-events: auto; 
        }

        /* استایل‌های جدید جایگزین Tailwind */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .items-start { align-items: flex-start; }
        .items-center { align-items: center; }
        .w-full { width: 100%; }
        .w-max { width: max-content; }
        .hidden { display: none; }
        .absolute { position: absolute; }
        .relative { position: relative; }
        .fixed { position: fixed; }
        .top-20 { top: 5rem; }
        .bottom-24 { bottom: 6rem; }
        .left-1\/2 { left: 50%; }
        .right-4 { right: 1rem; }
        .transform { transform: translateX(-50%); }
        .text-center { text-align: center; }
        .rounded-full { border-radius: 9999px; }
        .rounded-2xl { border-radius: 1rem; }
        .rounded-3xl { border-radius: 1.5rem; }
        .rounded-2rem { border-radius: 2rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .px-5 { padding-left: 1.25rem; padding-right: 1.25rem; }
        .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .gap-5 { gap: 1.25rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .min-w-72 { min-width: 18rem; }
        .text-sm { font-size: 0.875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-4xl { font-size: 2.25rem; }
        .font-bold { font-weight: bold; }
        .font-black { font-weight: 900; }
        .font-medium { font-weight: 500; }
        .tracking-wider { letter-spacing: 0.05em; }
        .tracking-widest { letter-spacing: 0.1em; }
        .text-white { color: white; }
        .text-yellow-400 { color: #facc15; }
        .text-cyan-100 { color: #cffafe; }
        .text-cyan-200 { color: #a5f3fc; }
        .text-orange-400 { color: #fb923c; }
        .text-red-500 { color: #ef4444; }
        .border-yellow-500\/30 { border-color: rgba(234, 179, 8, 0.3); }
        .border-cyan-400\/40 { border-color: rgba(34, 211, 238, 0.4); }
        .border-cyan-500\/30 { border-color: rgba(6, 182, 212, 0.3); }
        .border-orange-500\/50 { border-color: rgba(249, 115, 22, 0.5); }
        .bg-green-600 { background-color: #16a34a; }
        .border-green-400 { border-color: #4ade80; }
        .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .drop-shadow-glow { filter: drop-shadow(0 0 8px rgba(250, 204, 21, 0.8)); }
        .drop-shadow-glow-cyan { filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.6)); }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* مدیا کوئری برای ریسپانسیو */
        @media (min-width: 768px) {
            .md\:text-base { font-size: 1rem; }
            .md\:text-5xl { font-size: 3rem; }
            .md\:w-auto { width: auto; }
            .md\:w-\[600px\] { width: 600px; }
            .md\:p-6 { padding: 1.5rem; }
            .md\:flex-row { flex-direction: row; }
        }

        /* باکس سوال */
        #questionBox {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 15, 40, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 211, 238, 0.4);
            border-radius: 1.5rem;
            padding: 1.5rem;
            text-align: center;
            min-width: 300px;
            pointer-events: auto;
            display: none;
            flex-direction: column;
            gap: 1.25rem;
            z-index: 200;
        }

        #optionsDiv {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 0.5rem;
            direction: ltr;
        }

        .opt-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-size: 1.25rem;
            font-weight: bold;
            color: white;
            width: 45%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 768px) {
            .opt-btn {
                width: auto;
            }
        }

        #guideText {
            position: absolute;
            top: 5rem;
            left: 50%;
            transform: translateX(-50%);
            color: #a5f3fc;
            font-size: 0.875rem;
            background: rgba(10, 15, 40, 0.6);
            backdrop-filter: blur(12px);
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            border: 1px solid rgba(6, 182, 212, 0.3);
            text-align: center;
            width: max-content;
            white-space: nowrap;
        }

        @media (max-width: 640px) {
            #guideText {
                font-size: 0.75rem;
                white-space: normal;
                width: 90%;
                top: 4rem;
            }
            .opt-btn {
                font-size: 1rem;
                padding: 0.5rem 1rem;
            }
            #questionBox {
                min-width: 280px;
                padding: 1rem;
                bottom: 20%;
            }
        }

        #combo {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(10, 15, 40, 0.6);
            backdrop-filter: blur(12px);
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            color: #fb923c;
            font-weight: bold;
            font-size: 1.125rem;
            border: 1px solid rgba(249, 115, 22, 0.5);
            display: none;
        }

        #modeText {
            color: #a5f3fc;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bottom-control {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 600px;
            background: rgba(10, 15, 40, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1rem;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .bottom-control {
                flex-direction: row;
                width: 600px;
            }
        }

        .score-panel {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
        }
    </style>
</head>
<body>
    
    <div id="ui-layer">
        <!-- هدر: امتیاز -->
        <div style="display: flex; justify-content: space-between; align-items: flex-start; width: 100%; padding: 1rem;">
            <div class="score-panel glass-panel" style="border: 1px solid rgba(234, 179, 8, 0.3);">
                <span style="color: #facc15; font-size: 1.5rem; filter: drop-shadow(0 0 8px rgba(250,204,21,0.8));">⭐</span>
                <span id="score" style="color: white; font-weight: bold; font-size: 1.5rem; letter-spacing: 0.05em;">0</span>
            </div>
        </div>

        <!-- پیام راهنما -->
        <div id="guideText">
            👀 به اطراف بچرخید و روی سوالات نگاه کنید
        </div>

        <!-- باکس سوال -->
        <div id="questionBox">
            <div style="color: #cffafe; font-size: 0.875rem; opacity: 0.8;">به این معادله پاسخ دهید:</div>
            <div id="questionText" style="font-size: 2.25rem; font-weight: 900; color: white; letter-spacing: 0.1em; filter: drop-shadow(0 0 15px rgba(34,211,238,0.6));" dir="ltr"></div>
            <div id="optionsDiv"></div>
        </div>

        <!-- کنترل‌های پایین -->
        <div class="bottom-control">
            <div id="modeText">
                <span style="font-size: 1.25rem;">🖱️</span> کشیدن ماوس روی صفحه برای چرخش
            </div>
            <button id="enableGyroBtn" class="glass-btn" style="padding: 0.75rem 1.25rem; border-radius: 9999px; color: white; font-size: 0.875rem; font-weight: bold; display: flex; align-items: center; gap: 0.5rem; width: 100%; justify-content: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: none; cursor: pointer;">
                <span style="font-size: 1.25rem;">📱</span> فعال‌سازی ژیروسکوپ
            </button>
        </div>
    </div>

    <!-- نشانگر وسط -->
    <div id="crosshair"></div>
    <div id="combo">آفرین! 🚀</div>

    <!-- بارگذاری Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DeviceOrientationControls } from 'three/addons/controls/DeviceOrientationControls.js';

        // ==========================================
        // 1. سیستم صوتی (Web Audio API Synthesizer)
        // ==========================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.5, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'hover') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.1, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                
                osc.start(now);
                osc.stop(now + 0.1);
            }
        }

        // ==========================================
        // 2. تنظیمات اصلی صحنه (Scene Setup)
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x01010a, 0.001);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 3000);
        camera.position.set(0, 0, 0.1);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 3. کنترل‌ها (ماوس و ژیروسکوپ)
        // ==========================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.rotateSpeed = 0.7;

        let gyroActive = false;
        let gyroControls = null;

        document.getElementById('enableGyroBtn').addEventListener('click', async () => {
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const state = await DeviceOrientationEvent.requestPermission();
                    if (state === 'granted') {
                        activateGyro();
                    } else {
                        alert('برای استفاده از چرخش با گوشی، نیاز به مجوز سنسور است.');
                    }
                } catch (err) {
                    console.error(err);
                    alert('مرورگر شما از این قابلیت پشتیبانی نمی‌کند یا خطایی رخ داد.');
                }
            } else {
                activateGyro();
            }
        });

        function activateGyro() {
            gyroActive = true;
            controls.enabled = false;
            gyroControls = new DeviceOrientationControls(camera);
            
            const btn = document.getElementById('enableGyroBtn');
            btn.innerHTML = '✅ ژیروسکوپ فعال شد';
            btn.style.backgroundColor = '#16a34a';
            btn.style.border = '1px solid #4ade80';
            btn.classList.remove('glass-btn');
            
            document.getElementById('modeText').innerHTML = '<span style="font-size: 1.25rem;">📱</span> در حال چرخش با سنسور گوشی';
        }

        // ==========================================
        // 4. محیط و پس‌زمینه پویا (Environment)
        // ==========================================
        const createStars = (count, size, colorHex) => {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            
            for (let i = 0; i < count; i++) {
                const r = 400 + Math.random() * 400;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i*3+2] = r * Math.cos(phi);
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0,0,32,32);
            const starTexture = new THREE.CanvasTexture(canvas);

            const material = new THREE.PointsMaterial({
                color: colorHex,
                size: size,
                map: starTexture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            return new THREE.Points(geometry, material);
        };

        const starsLayer1 = createStars(2000, 4, 0xffffff);
        const starsLayer2 = createStars(800, 12, 0x88ccff);
        const starsLayer3 = createStars(400, 18, 0xffaa88);
        scene.add(starsLayer1);
        scene.add(starsLayer2);
        scene.add(starsLayer3);

        // ==========================================
        // 5. تولید سوالات ریاضی
        // ==========================================
        const questionsList = []; 
        
        function generateMathLogic() {
            const types = ['add', 'sub', 'mul', 'div', 'pow'];
            const type = types[Math.floor(Math.random() * types.length)];
            let text, answer, a, b;
            
            switch(type) {
                case 'add':
                    a = Math.floor(Math.random() * 50) + 10;
                    b = Math.floor(Math.random() * 50) + 10;
                    text = `${a} + ${b}`; answer = a + b; break;
                case 'sub':
                    a = Math.floor(Math.random() * 40) + 20;
                    b = Math.floor(Math.random() * 20) + 1;
                    text = `${a} - ${b}`; answer = a - b; break;
                case 'mul':
                    a = Math.floor(Math.random() * 10) + 2;
                    b = Math.floor(Math.random() * 10) + 2;
                    text = `${a} × ${b}`; answer = a * b; break;
                case 'div':
                    b = Math.floor(Math.random() * 9) + 2;
                    answer = Math.floor(Math.random() * 10) + 2;
                    a = b * answer;
                    text = `${a} ÷ ${b}`; break;
                case 'pow':
                    a = Math.floor(Math.random() * 4) + 2;
                    b = Math.floor(Math.random() * 2) + 2;
                    text = `${a}^${b}`; answer = Math.pow(a, b); break;
            }

            let options = [answer];
            while(options.length < 4) {
                let offset = Math.floor(Math.random() * 5) + 1;
                let fakeAns = Math.random() > 0.5 ? answer + offset : answer - offset;
                if(fakeAns > 0 && !options.includes(fakeAns)) options.push(fakeAns);
            }
            options.sort(() => Math.random() - 0.5);

            return { text, answer, options };
        }

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff';
            ctx.font = 'Bold 80px "Vazirmatn", "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.shadowColor = 'rgba(0,0,0,1)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetX = 4;
            ctx.shadowOffsetY = 4;
            
            ctx.fillText(text, canvas.width/2, canvas.height/2);
            return new THREE.CanvasTexture(canvas);
        }

        const glowCanvas = document.createElement('canvas');
        glowCanvas.width = 128; glowCanvas.height = 128;
        const gCtx = glowCanvas.getContext('2d');
        const gGrad = gCtx.createRadialGradient(64,64,0, 64,64,64);
        gGrad.addColorStop(0, 'rgba(0, 200, 255, 0.8)');
        gGrad.addColorStop(0.5, 'rgba(0, 100, 255, 0.4)');
        gGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        gCtx.fillStyle = gGrad;
        gCtx.fillRect(0,0,128,128);
        const glowTex = new THREE.CanvasTexture(glowCanvas);

        function spawnQuestion() {
            const logic = generateMathLogic();
            const group = new THREE.Group();
            
            const glowMat = new THREE.SpriteMaterial({
                map: glowTex, color: 0x00ffff, transparent: true,
                blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.8
            });
            const glowSprite = new THREE.Sprite(glowMat);
            glowSprite.scale.set(45, 22, 1);
            group.add(glowSprite);

            const textTex = createTextTexture(logic.text);
            const textMat = new THREE.SpriteMaterial({ map: textTex, transparent: true, depthTest: false });
            const textSprite = new THREE.Sprite(textMat);
            textSprite.scale.set(30, 15, 1);
            group.add(textSprite);

            const radius = 120 + Math.random() * 40; 
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.PI / 2 + (Math.random() - 0.5) * 1.5;
            
            group.position.set(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.sin(phi) * Math.sin(theta),
                radius * Math.cos(phi)
            );

            group.userData = {
                logic: logic, baseScale: 1.0, targetScale: 1.0,
                baseGlowColor: 0x00ffff, glowMat: glowMat
            };

            scene.add(group);
            questionsList.push(group);
        }

        for (let i = 0; i < 25; i++) {
            spawnQuestion();
        }

        // ==========================================
        // 6. سیستم ذرات انفجار
        // ==========================================
        const particleSystems = [];
        
        function createExplosion(position) {
            const particleCount = 150;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];
            const colors = new Float32Array(particleCount * 3);
            
            const colorObj = new THREE.Color();
            
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = position.x;
                positions[i*3+1] = position.y;
                positions[i*3+2] = position.z;
                
                const vx = (Math.random() - 0.5) * 20;
                const vy = (Math.random() - 0.5) * 20;
                const vz = (Math.random() - 0.5) * 20;
                velocities.push({x: vx, y: vy, z: vz});
                
                const hue = Math.random() > 0.5 ? 0.5 + Math.random()*0.1 : 0.1 + Math.random()*0.1;
                colorObj.setHSL(hue, 1.0, 0.6);
                colors[i*3] = colorObj.r; colors[i*3+1] = colorObj.g; colors[i*3+2] = colorObj.b;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const pMaterial = new THREE.PointsMaterial({
                size: 8, vertexColors: true, blending: THREE.AdditiveBlending,
                transparent: true, opacity: 1.0, depthWrite: false
            });
            
            const points = new THREE.Points(geometry, pMaterial);
            scene.add(points);
            particleSystems.push({ mesh: points, velocities: velocities, life: 1.0 });
        }

        // ==========================================
        // 7. منطق بازی و Raycaster
        // ==========================================
        let score = 0;
        let isQuestionOpen = false;
        let currentTargetGroup = null;
        const raycaster = new THREE.Raycaster();
        const centerPos = new THREE.Vector2(0, 0);
        
        const crosshair = document.getElementById('crosshair');
        const questionBox = document.getElementById('questionBox');
        const scoreUI = document.getElementById('score');

        function showQuestionUI(group) {
            if (isQuestionOpen) return;
            isQuestionOpen = true;
            currentTargetGroup = group;
            
            document.getElementById('guideText').style.display = 'none';
            
            const logic = group.userData.logic;
            document.getElementById('questionText').innerHTML = logic.text;
            
            const optDiv = document.getElementById('optionsDiv');
            optDiv.innerHTML = '';
            
            logic.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.textContent = opt;
                btn.onclick = () => handleAnswer(opt, logic.answer, group);
                optDiv.appendChild(btn);
            });
            
            questionBox.style.display = 'flex';
            questionBox.classList.add('show-question');
            group.userData.glowMat.color.setHex(0xffaa00);
        }

        function handleAnswer(selected, correct, group) {
            if (selected === correct) {
                playSound('correct');
                score += 10;
                scoreUI.innerHTML = score;
                
                createExplosion(group.position);
                
                const combo = document.getElementById('combo');
                combo.style.display = 'block';
                setTimeout(() => combo.style.display = 'none', 1500);

                scene.remove(group);
                const index = questionsList.indexOf(group);
                if(index > -1) questionsList.splice(index, 1);
                
                setTimeout(spawnQuestion, 1000); 

            } else {
                playSound('wrong');
                score = Math.max(0, score - 5);
                scoreUI.innerHTML = score;
                
                const originalText = document.getElementById('questionText').innerHTML;
                document.getElementById('questionText').innerHTML = `<span style="color: #ef4444;">❌</span>`;
                setTimeout(() => {
                    if(isQuestionOpen && currentTargetGroup === group) {
                        document.getElementById('questionText').innerHTML = originalText;
                    }
                }, 500);
            }
            
            if (selected === correct) closeQuestionUI();
        }

        function closeQuestionUI() {
            questionBox.style.display = 'none';
            questionBox.classList.remove('show-question');
            isQuestionOpen = false;
            
            if (currentTargetGroup && questionsList.includes(currentTargetGroup)) {
                currentTargetGroup.userData.glowMat.color.setHex(currentTargetGroup.userData.baseGlowColor);
                currentTargetGroup.userData.targetScale = 1.0;
            }
            currentTargetGroup = null;
        }

        let lastRaycastTime = 0;
        
        function updateRaycaster(time) {
            if (isQuestionOpen) return;
            
            if (time - lastRaycastTime > 100) {
                raycaster.setFromCamera(centerPos, camera);
                const targets = questionsList.map(g => g.children[1]); 
                const intersects = raycaster.intersectObjects(targets);

                let hitGroup = null;
                if (intersects.length > 0) {
                    hitGroup = intersects[0].object.parent;
                }

                questionsList.forEach(g => {
                    if (g === hitGroup) {
                        if (g.userData.targetScale === 1.0) playSound('hover');
                        g.userData.targetScale = 1.4; 
                    } else {
                        g.userData.targetScale = 1.0; 
                    }
                });

                if (hitGroup) {
                    crosshair.classList.add('crosshair-active');
                    showQuestionUI(hitGroup);
                } else {
                    crosshair.classList.remove('crosshair-active');
                }

                lastRaycastTime = time;
            }
        }

        // ==========================================
        // 8. حلقه رندر اصلی
        // ==========================================
        const clock = new THREE.Clock();

        function renderLoop(time) {
            requestAnimationFrame(renderLoop);
            const delta = clock.getDelta();

            if (gyroActive && gyroControls) {
                gyroControls.update();
            } else {
                controls.update();
            }

            starsLayer1.rotation.y += delta * 0.02;
            starsLayer2.rotation.y -= delta * 0.01;
            starsLayer3.rotation.z += delta * 0.015;

            questionsList.forEach(group => {
                const ts = group.userData.targetScale;
                group.scale.lerp(new THREE.Vector3(ts, ts, ts), 0.15);
                group.position.y += Math.sin(time * 0.002 + group.position.x) * 0.15;
            });

            for (let i = particleSystems.length - 1; i >= 0; i--) {
                const ps = particleSystems[i];
                ps.life -= delta * 1.5; 
                
                if (ps.life <= 0) {
                    scene.remove(ps.mesh);
                    ps.mesh.geometry.dispose();
                    ps.mesh.material.dispose();
                    particleSystems.splice(i, 1);
                    continue;
                }
                
                const positions = ps.mesh.geometry.attributes.position.array;
                for (let j = 0; j < ps.velocities.length; j++) {
                    positions[j*3] += ps.velocities[j].x * delta;
                    positions[j*3+1] += ps.velocities[j].y * delta;
                    positions[j*3+2] += ps.velocities[j].z * delta;
                    
                    ps.velocities[j].x *= 0.95;
                    ps.velocities[j].y *= 0.95;
                    ps.velocities[j].z *= 0.95;
                }
                ps.mesh.geometry.attributes.position.needsUpdate = true;
                ps.mesh.material.opacity = ps.life;
            }

            updateRaycaster(time);
            renderer.render(scene, camera);
        }

        renderLoop(0);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
