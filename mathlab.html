<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>آزمایشگاه ریاضی تعاملی | نسخه پرو</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-glass: rgba(15, 23, 42, 0.65);
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Vazirmatn', sans-serif;
        }
        body {
            overflow: hidden;
            background: #020617;
            color: white;
        }
        /* Dashboard Styling */
        .dashboard {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
            border: 1px solid var(--border-glass);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .dashboard h1 {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.6rem;
            font-weight: 800;
        }
        .dashboard p {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .score-area {
            background: rgba(0, 242, 254, 0.1);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            color: var(--primary);
            border: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
            50% { box-shadow: 0 0 25px rgba(0, 242, 254, 0.5); }
            100% { box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
        }
        /* Bottom Menu */
        .topic-menu {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 200;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 60px;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid var(--border-glass);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .topic-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            color: #cbd5e1;
            padding: 10px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
        }
        .topic-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        .topic-btn.active {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #0f172a;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
            border-color: rgba(255,255,255,0.5);
        }
        /* Info Panel */
        .info-panel {
            position: absolute;
            top: 120px;
            right: 20px;
            width: 320px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 22px;
            border: 1px solid var(--border-glass);
            border-right: 5px solid var(--primary);
            z-index: 200;
            pointer-events: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        .info-panel h3 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-panel p {
            color: #e2e8f0;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .math-output {
            margin-top: 18px;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            direction: ltr;
            text-align: left;
            color: #a7f3d0;
            line-height: 1.5;
        }
        /* 3D Labels */
        .drag-label {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            transition: all 0.1s ease;
        }
        @media (max-width: 768px) {
            .info-panel { width: 280px; top: 110px; }
            .dashboard { padding: 10px 15px; flex-direction: column; gap: 10px; text-align: center; }
            .topic-menu { width: 90%; bottom: 15px; }
            .topic-btn { padding: 8px 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div>
            <h1>🌌 آزمایشگاه ریاضی سه‌بعدی</h1>
            <p>مفاهیم ریاضی را با کشیدن و رها کردن (Drag & Drop) درک کنید</p>
        </div>
        <div class="score-area" id="scoreArea">محاسبات زنده فعال است ⚡</div>
    </div>
    
    <div class="info-panel" id="infoPanel">
        <h3 id="infoTitle">📐 قضیه فیثاغورس</h3>
        <p id="infoDesc">کره‌های نارنجی را بکشید.</p>
        <div class="math-output" id="mathOutput">a² + b² = c²</div>
    </div>

    <div class="topic-menu">
        <button class="topic-btn" data-topic="algebra">📐 اتحاد مربع</button>
        <button class="topic-btn active" data-topic="pythagoras">📏 فیثاغورس</button>
        <button class="topic-btn" data-topic="shapes">🧊 مکعب</button>
        <button class="topic-btn" data-topic="cylinder">🧴 استوانه</button>
        <button class="topic-btn" data-topic="circle">⚪ دایره</button>
        <button class="topic-btn" data-topic="stats">📊 آمار</button>
        <button class="topic-btn" data-topic="equation">⚖️ معادله</button>
    </div>

    <!-- Import maps -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DragControls } from 'three/addons/controls/DragControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup Scene ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020617, 0.015);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // نذاریم خیلی بره زیر زمین

        // --- Lighting ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        const spotLight = new THREE.SpotLight(0xffffff, 1.2);
        spotLight.position.set(10, 15, 10);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 2048;
        spotLight.shadow.mapSize.height = 2048;
        scene.add(spotLight);

        const blueLight = new THREE.PointLight(0x00f2fe, 0.8);
        blueLight.position.set(-5, 5, -5);
        scene.add(blueLight);

        // --- Background Environment (Stars/Grid) ---
        const grid = new THREE.GridHelper(30, 30, 0x00f2fe, 0x1e293b);
        grid.position.y = -1.5;
        grid.material.transparent = true;
        grid.material.opacity = 0.2;
        scene.add(grid);

        // Particles
        const particlesGeo = new THREE.BufferGeometry();
        const particlesCount = 700;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 40;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particleMat = new THREE.PointsMaterial({ size: 0.05, color: 0x4facfe, transparent: true, opacity: 0.6 });
        const particleMesh = new THREE.Points(particlesGeo, particleMat);
        scene.add(particleMesh);

        // --- Core Variables ---
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);
        let activeDragControls = null;

        // --- Helpers ---
        function clearScene() {
            while(currentGroup.children.length > 0) {
                currentGroup.remove(currentGroup.children[0]);
            }
            if(activeDragControls) {
                activeDragControls.dispose();
                activeDragControls = null;
            }
        }

        function makeLabel(text, color = '#00f2fe') {
            const div = document.createElement('div');
            div.className = 'drag-label';
            div.textContent = text;
            div.style.borderColor = color;
            return new CSS2DObject(div);
        }

        // Premium Material Generator
        function getGlassMaterial(colorHex, opacity = 0.7) {
            return new THREE.MeshPhysicalMaterial({
                color: colorHex,
                metalness: 0.1,
                roughness: 0.2,
                transparent: true,
                opacity: opacity,
                transmission: 0.5,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1,
                side: THREE.DoubleSide
            });
        }

        function createHandle() {
            const geo = new THREE.SphereGeometry(0.3, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0xffd700, 
                emissive: 0xaa6600,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.8
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            return mesh;
        }

        function setupDragEvents(controlsArray, updateFunction, axisConstraint = {}) {
            activeDragControls = new DragControls(controlsArray, camera, renderer.domElement);
            
            // Hover effects for better UX
            activeDragControls.addEventListener('hoveron', function (event) {
                document.body.style.cursor = 'grab';
                event.object.scale.set(1.3, 1.3, 1.3);
                event.object.material.emissiveIntensity = 1;
            });
            activeDragControls.addEventListener('hoveroff', function (event) {
                document.body.style.cursor = 'auto';
                event.object.scale.set(1, 1, 1);
                event.object.material.emissiveIntensity = 0.5;
            });

            activeDragControls.addEventListener('dragstart', function (event) {
                controls.enabled = false;
                document.body.style.cursor = 'grabbing';
            });
            
            activeDragControls.addEventListener('drag', function (event) {
                // Apply constraints
                if(axisConstraint.x !== undefined) event.object.position.x = axisConstraint.x(event.object);
                if(axisConstraint.y !== undefined) event.object.position.y = axisConstraint.y(event.object);
                if(axisConstraint.z !== undefined) event.object.position.z = axisConstraint.z(event.object);
                updateFunction();
            });

            activeDragControls.addEventListener('dragend', function (event) {
                controls.enabled = true;
                document.body.style.cursor = 'grab';
            });
        }

        // ===================== 1. Pythagoras =====================
        function loadPythagoras() {
            clearScene();
            const pointA = createHandle();
            const pointB = createHandle();
            pointA.position.set(4, 0, 0);
            pointB.position.set(0, 0, 3);
            currentGroup.add(pointA, pointB);

            const triangleMat = getGlassMaterial(0x42a5f5, 0.6);
            const triangleMesh = new THREE.Mesh(new THREE.BufferGeometry(), triangleMat);
            triangleMesh.receiveShadow = true;
            currentGroup.add(triangleMesh);

            // Visual squares on the sides
            const squareAMat = new THREE.MeshBasicMaterial({color: 0xef4444, transparent: true, opacity: 0.3, side: THREE.DoubleSide});
            const squareBMat = new THREE.MeshBasicMaterial({color: 0x22c55e, transparent: true, opacity: 0.3, side: THREE.DoubleSide});
            const squareAMesh = new THREE.Mesh(new THREE.PlaneGeometry(1,1), squareAMat);
            const squareBMesh = new THREE.Mesh(new THREE.PlaneGeometry(1,1), squareBMat);
            squareAMesh.rotation.x = Math.PI / 2;
            squareBMesh.rotation.x = Math.PI / 2;
            currentGroup.add(squareAMesh, squareBMesh);

            const labelA = makeLabel('a = 4.0', '#ef4444');
            const labelB = makeLabel('b = 3.0', '#22c55e');
            const labelC = makeLabel('c = 5.0', '#42a5f5');
            currentGroup.add(labelA, labelB, labelC);

            function update() {
                let a = Math.abs(pointA.position.x);
                let b = Math.abs(pointB.position.z);
                if(a < 1) { a = 1; pointA.position.x = 1; }
                if(b < 1) { b = 1; pointB.position.z = 1; }
                const c = Math.sqrt(a*a + b*b);

                const vertices = new Float32Array([0,0,0, a,0,0, 0,0,b]);
                triangleMesh.geometry.dispose();
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                geo.setIndex([0,1,2]);
                geo.computeVertexNormals();
                triangleMesh.geometry = geo;

                // Update physical squares
                squareAMesh.geometry.dispose();
                squareAMesh.geometry = new THREE.PlaneGeometry(a, a);
                squareAMesh.position.set(a/2, -0.01, -a/2);

                squareBMesh.geometry.dispose();
                squareBMesh.geometry = new THREE.PlaneGeometry(b, b);
                squareBMesh.position.set(-b/2, -0.01, b/2);

                labelA.position.set(a/2, 0.2, 0);
                labelA.element.textContent = `a = ${a.toFixed(1)}`;
                labelB.position.set(0, 0.2, b/2);
                labelB.element.textContent = `b = ${b.toFixed(1)}`;
                labelC.position.set(a/2, 0.2, b/2);
                labelC.element.textContent = `c = ${c.toFixed(1)}`;

                document.getElementById('mathOutput').innerHTML = 
                    `مساحت قرمز (a²) = ${(a*a).toFixed(2)}<br>` +
                    `مساحت سبز (b²) = ${(b*b).toFixed(2)}<br>` +
                    `مجموع (c²) = ${(c*c).toFixed(2)}<br>` +
                    `<strong style="color:#fff">وتر (c) = ${c.toFixed(2)}</strong>`;
                document.getElementById('infoTitle').innerHTML = '📏 قضیه فیثاغورس';
                document.getElementById('infoDesc').innerHTML = 'کره‌ها را بکشید. مربع‌های تشکیل شده روی اضلاع را ببینید که مجموع مساحتشان برابر مربع وتر است.';
            }

            setupDragEvents([pointA, pointB], update, {
                y: () => 0,
                x: (obj) => obj === pointB ? 0 : obj.position.x,
                z: (obj) => obj === pointA ? 0 : obj.position.z
            });
            update();
        }

        // ===================== 2. Algebra (a+b)^2 =====================
        function loadAlgebra() {
            clearScene();
            const handleA = createHandle();
            const handleB = createHandle();
            handleA.position.set(2, 0.1, 0);
            handleB.position.set(0, 0.1, 1.5);
            
            const matA = getGlassMaterial(0x3b82f6, 0.8);
            const matB = getGlassMaterial(0xef4444, 0.8);
            const matAB = getGlassMaterial(0x10b981, 0.5);

            const squareA = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 1), matA);
            const squareB = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 1), matB);
            const rect1 = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 1), matAB);
            const rect2 = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 1), matAB);
            
            [squareA, squareB, rect1, rect2].forEach(m => { m.castShadow = true; m.receiveShadow = true; currentGroup.add(m); });
            currentGroup.add(handleA, handleB);

            const labelA = makeLabel('a');
            const labelB = makeLabel('b');
            currentGroup.add(labelA, labelB);

            function update() {
                const a = Math.max(1, Math.abs(handleA.position.x));
                const b = Math.max(1, Math.abs(handleB.position.z));
                handleA.position.set(a, 0.1, 0);
                handleB.position.set(0, 0.1, b);

                squareA.scale.set(a, 1, a);
                squareA.position.set(-a/2, 0, -a/2);
                
                squareB.scale.set(b, 1, b);
                squareB.position.set(b/2, 0, b/2);
                
                rect1.scale.set(a, 1, b);
                rect1.position.set(-a/2, 0, b/2);
                
                rect2.scale.set(b, 1, a);
                rect2.position.set(b/2, 0, -a/2);

                labelA.position.set(a/2 + 0.5, 0.5, 0);
                labelA.element.textContent = `a = ${a.toFixed(1)}`;
                labelB.position.set(0, 0.5, b/2 + 0.5);
                labelB.element.textContent = `b = ${b.toFixed(1)}`;

                document.getElementById('mathOutput').innerHTML = 
                    `مساحت a² = ${(a*a).toFixed(1)}<br>` +
                    `مساحت b² = ${(b*b).toFixed(1)}<br>` +
                    `مستطیل‌ها (2ab) = ${(2*a*b).toFixed(1)}<br>` +
                    `<hr style="border-color:#555; margin:5px 0;">` +
                    `کل (a+b)² = ${((a+b)**2).toFixed(1)}`;
                document.getElementById('infoTitle').innerHTML = '📐 اتحاد مربع دو جمله‌ای';
                document.getElementById('infoDesc').innerHTML = 'مساحت کل مربع بزرگ برابر است با مجموع مساحت ۴ شکل کوچکتر.';
            }

            setupDragEvents([handleA, handleB], update, {
                y: () => 0.1,
                z: (obj) => obj === handleA ? 0 : obj.position.z,
                x: (obj) => obj === handleB ? 0 : obj.position.x
            });
            update();
        }

        // ===================== 3. Cube =====================
        function loadShapes() {
            clearScene();
            const cubeMat = getGlassMaterial(0xa855f7, 0.85);
            const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), cubeMat);
            cube.castShadow = true;
            
            // Add wireframe to see edges better
            const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1));
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
            cube.add(line);
            
            currentGroup.add(cube);
            
            const handle = createHandle();
            handle.position.set(2, 1, 2);
            currentGroup.add(handle);
            
            const labelVol = makeLabel('V = ?');
            currentGroup.add(labelVol);

            function update() {
                let size = Math.max(1, Math.abs(handle.position.x));
                handle.position.set(size, size/2, size);
                
                cube.scale.set(size, size, size);
                cube.position.y = size/2;
                
                const vol = Math.pow(size, 3);
                labelVol.position.set(0, size + 0.5, 0);
                labelVol.element.textContent = `a = ${size.toFixed(1)}`;

                document.getElementById('mathOutput').innerHTML = 
                    `طول یال (a) = ${size.toFixed(2)}<br>` +
                    `مساحت یک وجه = ${(size*size).toFixed(2)}<br>` +
                    `مساحت کل (6a²) = ${(6*size*size).toFixed(2)}<br>` +
                    `<strong style="color:#fff">حجم (a³) = ${vol.toFixed(2)}</strong>`;
                document.getElementById('infoTitle').innerHTML = '🧊 حجم و مساحت مکعب';
                document.getElementById('infoDesc').innerHTML = 'کره طلایی را بکشید تا ابعاد مکعب در سه بعد (طول، عرض، ارتفاع) به طور همزمان تغییر کند.';
            }

            setupDragEvents([handle], update, {
                z: (obj) => obj.position.x,
                y: (obj) => obj.position.x / 2
            });
            update();
        }

        // ===================== 4. Cylinder =====================
        function loadCylinder() {
            clearScene();
            const cylinderMat = getGlassMaterial(0xf59e0b, 0.7);
            const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 1, 64), cylinderMat);
            cylinder.castShadow = true;
            
            // Wireframe circles for top and bottom
            const edgeGeo = new THREE.EdgesGeometry(new THREE.CylinderGeometry(1,1,1,32));
            const edgeLines = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.3}));
            cylinder.add(edgeLines);

            currentGroup.add(cylinder);

            const radiusHandle = createHandle();
            radiusHandle.position.set(2, 0.1, 0);
            const heightHandle = createHandle();
            heightHandle.material.color.setHex(0xff3366); // Different color for height
            heightHandle.position.set(0, 3, 0);
            
            currentGroup.add(radiusHandle, heightHandle);

            function update() {
                let r = Math.max(0.5, Math.abs(radiusHandle.position.x));
                let h = Math.max(0.5, Math.abs(heightHandle.position.y));
                
                radiusHandle.position.set(r, 0.1, 0);
                heightHandle.position.set(0, h, 0);

                cylinder.geometry.dispose();
                cylinder.geometry = new THREE.CylinderGeometry(r, r, h, 64);
                cylinder.position.y = h/2;
                
                edgeLines.geometry.dispose();
                edgeLines.geometry = new THREE.EdgesGeometry(cylinder.geometry);

                const volume = Math.PI * r * r * h;
                document.getElementById('mathOutput').innerHTML = 
                    `شعاع (r) = ${r.toFixed(2)}<br>` +
                    `ارتفاع (h) = ${h.toFixed(2)}<br>` +
                    `مساحت قاعده = ${(Math.PI * r * r).toFixed(2)}<br>` +
                    `<strong style="color:#fff">حجم (πr²h) = ${volume.toFixed(2)}</strong>`;
                document.getElementById('infoTitle').innerHTML = '🧴 حجم استوانه';
                document.getElementById('infoDesc').innerHTML = 'کره طلایی برای تغییر شعاع و کره صورتی برای تغییر ارتفاع است.';
            }

            setupDragEvents([radiusHandle, heightHandle], update, {
                y: (obj) => obj === radiusHandle ? 0.1 : obj.position.y,
                x: (obj) => obj === heightHandle ? 0 : obj.position.x,
                z: () => 0
            });
            update();
        }

        // ===================== 5. Circle =====================
        function loadCircle() {
            clearScene();
            const rHandle = createHandle();
            rHandle.position.set(2.5, 0.1, 0);
            currentGroup.add(rHandle);

            const lineMat = new THREE.LineBasicMaterial({ color: 0x00f2fe, linewidth: 3 });
            const circleLine = new THREE.LineLoop(new THREE.BufferGeometry(), lineMat);
            
            const areaMat = new THREE.MeshBasicMaterial({color: 0x00f2fe, transparent: true, opacity: 0.2, side: THREE.DoubleSide});
            const areaMesh = new THREE.Mesh(new THREE.CircleGeometry(1, 64), areaMat);
            areaMesh.rotation.x = -Math.PI / 2;

            currentGroup.add(circleLine, areaMesh);

            const radiusLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0xffffff }));
            currentGroup.add(radiusLine);

            const center = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xffffff}));
            currentGroup.add(center);

            function update() {
                let r = Math.max(0.5, Math.abs(rHandle.position.x));
                rHandle.position.set(r, 0.1, 0);

                // Update Line Circle
                const points = [];
                for(let i=0; i<=64; i++) {
                    const angle = (i/64) * Math.PI * 2;
                    points.push(new THREE.Vector3(Math.cos(angle)*r, 0, Math.sin(angle)*r));
                }
                circleLine.geometry.dispose();
                circleLine.geometry = new THREE.BufferGeometry().setFromPoints(points);

                // Update Area
                areaMesh.geometry.dispose();
                areaMesh.geometry = new THREE.CircleGeometry(r, 64);

                // Update Radius Line
                radiusLine.geometry.dispose();
                radiusLine.geometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(r,0,0)]);

                document.getElementById('mathOutput').innerHTML = 
                    `شعاع (r) = ${r.toFixed(2)}<br>` +
                    `قطر (d) = ${(r*2).toFixed(2)}<br>` +
                    `محیط (2πr) = ${(2*Math.PI*r).toFixed(2)}<br>` +
                    `مساحت (πr²) = ${(Math.PI*r*r).toFixed(2)}`;
                document.getElementById('infoTitle').innerHTML = '⚪ دایره و عدد پی';
                document.getElementById('infoDesc').innerHTML = 'شعاع را تغییر دهید تا رابطه خطی محیط و رابطه توان دوم مساحت را حس کنید.';
            }

            setupDragEvents([rHandle], update, { y: () => 0.1, z: () => 0 });
            update();
        }

        // ===================== 6. Statistics =====================
        function loadStatistics() {
            clearScene();
            const data = [4, 8, 5, 10, 6];
            const colors = [0xef4444, 0xf59e0b, 0x10b981, 0x3b82f6, 0xa855f7];
            const bars = [];
            const handles = [];
            let xPos = -4;

            // Mean line
            const meanLineGeo = new THREE.PlaneGeometry(10, 0.05);
            const meanLineMat = new THREE.MeshBasicMaterial({color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.8});
            const meanLine = new THREE.Mesh(meanLineGeo, meanLineMat);
            currentGroup.add(meanLine);

            for(let i=0; i<data.length; i++) {
                const mat = getGlassMaterial(colors[i], 0.8);
                const bar = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mat);
                bar.castShadow = true;
                currentGroup.add(bar);

                const handle = createHandle();
                handle.position.set(xPos, data[i], 0);
                handle.userData = { id: i, initX: xPos };
                currentGroup.add(handle);
                
                bars.push(bar);
                handles.push(handle);
                xPos += 2;
            }

            function update() {
                let sum = 0;
                handles.forEach((h, i) => {
                    let val = Math.max(0.5, h.position.y);
                    h.position.set(h.userData.initX, val, 0);
                    
                    bars[i].scale.set(1, val, 1);
                    bars[i].position.set(h.userData.initX, val/2, 0);
                    sum += val;
                });

                const mean = sum / data.length;
                meanLine.position.set(0, mean, 0);
                meanLine.rotation.x = -Math.PI / 2; // Flat line pointing front

                document.getElementById('mathOutput').innerHTML = 
                    `مجموع مقادیر = ${sum.toFixed(1)}<br>` +
                    `تعداد داده‌ها = ${data.length}<br>` +
                    `<hr style="border-color:#555; margin:5px 0;">` +
                    `<strong style="color:#fff">میانگین (خط سفید) = ${mean.toFixed(2)}</strong>`;
                document.getElementById('infoTitle').innerHTML = '📊 مفهوم میانگین';
                document.getElementById('infoDesc').innerHTML = 'ستون‌ها را به صورت عمودی جابجا کنید. خط سفید نشان‌دهنده میانگین (نقطه تعادل) داده‌هاست.';
            }

            setupDragEvents(handles, update, {
                x: (obj) => obj.userData.initX,
                z: () => 0
            });
            update();
        }

        // ===================== 7. Equation =====================
        function loadEquation() {
            clearScene();
            // Base scale
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 1, 0.5, 32), new THREE.MeshStandardMaterial({color: 0x475569}));
            base.position.y = -1;
            const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 3, 32), new THREE.MeshStandardMaterial({color: 0x94a3b8}));
            stick.position.y = 0.5;
            
            const board = new THREE.Group();
            board.position.y = 2;
            const beam = new THREE.Mesh(new THREE.BoxGeometry(6, 0.2, 0.5), new THREE.MeshStandardMaterial({color: 0xcbd5e1}));
            board.add(beam);

            // Weights
            const xMat = getGlassMaterial(0x3b82f6, 0.9);
            const numMat = getGlassMaterial(0x10b981, 0.9);

            const weightX = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), xMat);
            weightX.position.set(-2.5, 0.6, 0);
            
            const weightConstant = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.8), numMat);
            weightConstant.position.set(-1.2, 0.5, 0);
            
            const targetWeight = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), numMat);
            targetWeight.position.set(2.5, 0.7, 0);

            board.add(weightX, weightConstant, targetWeight);
            currentGroup.add(base, stick, board);

            const xHandle = createHandle();
            xHandle.position.set(-2.5, 3.5, 0);
            currentGroup.add(xHandle);

            function update() {
                // Limit X height drag to simulate value
                let val = Math.max(1, Math.min(10, xHandle.position.y));
                xHandle.position.set(-2.5, val, 0);
                
                // Map y position to a value between 1 and 8
                let targetEquationValue = 8; // Right side is 8
                let constantValue = 3;       // Left constant is 3
                let xValue = (val - 1);      // x scale based on handle

                weightX.scale.set(1, xValue/3 + 0.1, 1);
                weightX.position.y = (xValue/3 + 0.1)/2 + 0.1;

                // Calculate tilt
                let leftSide = xValue + constantValue;
                let rightSide = targetEquationValue;
                let difference = leftSide - rightSide;
                
                // Rotate board based on difference (smooth clamping)
                let targetRotation = Math.max(-0.4, Math.min(0.4, difference * -0.1));
                board.rotation.z = targetRotation;

                document.getElementById('mathOutput').innerHTML = 
                    `معادله: x + 3 = 8<br>` +
                    `مقدار x شما = ${xValue.toFixed(1)}<br>` +
                    `کفه چپ = ${(leftSide).toFixed(1)} | کفه راست = ${rightSide}<br>` +
                    `<strong style="color:${Math.abs(difference) < 0.2 ? '#10b981' : '#ef4444'}">` + 
                    (Math.abs(difference) < 0.2 ? '✅ معادله در تعادل است (x=5)' : '❌ نامتعادل') + `</strong>`;
                    
                document.getElementById('infoTitle').innerHTML = '⚖️ معادله و ترازوی ریاضی';
                document.getElementById('infoDesc').innerHTML = 'کره طلایی را بالا و پایین کنید تا وزن بلوک آبی (x) تغییر کند و ترازو به تعادل برسد.';
            }

            setupDragEvents([xHandle], update, { x: () => -2.5, z: () => 0 });
            update();
        }

        // --- Event Listeners ---
        const topics = {
            algebra: loadAlgebra,
            pythagoras: loadPythagoras,
            shapes: loadShapes,
            cylinder: loadCylinder,
            circle: loadCircle,
            stats: loadStatistics,
            equation: loadEquation
        };

        document.querySelectorAll('.topic-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const topic = btn.dataset.topic;
                if(topics[topic]) {
                    topics[topic]();
                    document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                }
            });
        });

        // Init
        loadPythagoras();

        // Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            
            // Subtle floating effect for the particle background
            particleMesh.rotation.y = time * 0.05;
            
            // Slight floating for labels to make UI feel alive
            labelRenderer.domElement.style.transform = `translateY(${Math.sin(time * 2) * 2}px)`;

            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
