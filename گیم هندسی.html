<body>
  <div id="root"></div>
  <script type="text/babel">
    
    const { useState, useEffect } = React;
    const { createRoot } = ReactDOM;

    // --- Icons (SVG) ---
    const Star = ({size, className}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    const CheckCircle = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const XCircle = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
    const ChevronRight = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
    const RefreshCw = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>;
    const Award = ({size, className}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>;
    const Download = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;

    const QUESTIONS = {"easy":[{"id":1,"type":"convex","question":"کدام گزینه تعریف صحیح یک چندضلعی محدب است؟","options":["حداقل یک زاویه داخلی بزرگتر از ۱۸۰ درجه دارد.","تمامی زوایای داخلی آن کمتر از ۱۸۰ درجه هستند.","ضلع‌های آن یکدیگر را قطع می‌کنند.","مجموع زوایای خارجی آن ۳۶۰ درجه نیست."],"correct":1,"explanation":"در چندضلعی محدب، تمام زوایای داخلی کمتر از ۱۸۰ درجه هستند و هیچ بخشی از خط واصل بین دو نقطه درون شکل، خارج از آن نمی‌افتد."},{"id":2,"type":"parallelogram_basic","question":"در یک متوازی‌الاضلاع، کدام ویژگی درباره ضلع‌ها صحیح است؟","options":["فقط یک جفت ضلع موازی هستند.","ضلع‌های روبرو هم‌اندازه و موازی هستند.","همه ضلع‌ها لزوماً با هم برابرند.","ضلع‌های مجاور بر هم عمودند."],"correct":1,"explanation":"ویژگی اصلی متوازی‌الاضلاع این است که ضلع‌های روبرو دو به دو موازی و مساوی هستند."},{"id":3,"type":"triangle_sum","question":"مجموع زوایای داخلی یک مثلث همیشه چقدر است؟","options":["۹۰ درجه","۱۸۰ درجه","۳۶۰ درجه","۲۷۰ درجه"],"correct":1,"explanation":"مجموع زوایای داخلی هر مثلث، فارغ از نوع آن، همواره ۱۸۰ درجه است."},{"id":4,"type":"square_props","question":"کدام شکل هم چهار ضلع برابر دارد و هم چهار زاویه ۹۰ درجه؟","options":["لوزی","مستطیل","مربع","متوازی‌الاضلاع"],"correct":2,"explanation":"مربع یک چهارضلعی منتظم است که هم اضلاع برابر (مانند لوزی) و هم زوایای قائمه (مانند مستطیل) دارد."},{"id":5,"type":"rectangle_diag","question":"در مورد قطرهای مستطیل چه می‌دانیم؟","options":["برابرند اما یکدیگر را نصف نمی‌کنند.","برابرند و یکدیگر را نصف می‌کنند.","بر هم عمودند.","نابرابر هستند."],"correct":1,"explanation":"در مستطیل، قطرها با هم برابرند و یکدیگر را نیز نصف می‌کنند (اما لزوماً بر هم عمود نیستند)."},{"id":6,"type":"circle_radius","question":"رابطه بین قطر و شعاع دایره چیست؟","options":["قطر نصف شعاع است.","قطر دو برابر شعاع است.","قطر سه برابر شعاع است.","قطر و شعاع برابرند."],"correct":1,"explanation":"قطر دایره بزرگترین وتر است که از مرکز می‌گذرد و طول آن همیشه دو برابر شعاع است."},{"id":19,"type":"convex","question":"یک پنج‌ضلعی منتظم چند ضلع دارد؟","options":["۴ ضلع","۵ ضلع","۶ ضلع","۸ ضلع"],"correct":1,"explanation":"همانطور که از نامش پیداست، پنج‌ضلعی دارای ۵ ضلع و ۵ زاویه است."},{"id":20,"type":"triangle_sum","question":"زاویه‌ای که کمتر از ۹۰ درجه باشد چه نام دارد؟","options":["زاویه قائمه","زاویه منفرجه","زاویه حاده (تند)","زاویه نیم‌صفحه"],"correct":2,"explanation":"زاویه حاده یا تند، زاویه‌ای است که اندازه آن بین ۰ تا ۹۰ درجه باشد."},{"id":21,"type":"square_props","question":"فرمول محیط مربع چیست؟ (a طول ضلع است)","options":["a × a","4 × a","2 × a","a + 4"],"correct":1,"explanation":"محیط مربع برابر است با مجموع چهار ضلع آن، یعنی ۴ ضربدر طول یک ضلع."},{"id":22,"type":"square_props","question":"زاویه قائمه چند درجه است؟","options":["۴۵ درجه","۹۰ درجه","۱۸۰ درجه","۳۶۰ درجه"],"correct":1,"explanation":"زاویه قائمه یا راست دقیقاً برابر با ۹۰ درجه است."},{"id":23,"type":"circle_radius","question":"فاصله مرکز دایره تا هر نقطه روی محیط دایره چه نام دارد؟","options":["قطر","وتر","کمان","شعاع"],"correct":3,"explanation":"شعاع، پاره‌خطی است که مرکز دایره را به محیط آن وصل می‌کند و در تمام نقاط برابر است."}],"medium":[{"id":7,"type":"parallelogram_diag","question":"در متوازی‌الاضلاع ABCD، قطرها چه ویژگی خاصی دارند؟","options":["با هم برابرند.","بر هم عمودند.","یکدیگر را نصف می‌کنند.","نیمساز زاویه‌های داخلی هستند."],"correct":2,"explanation":"در هر متوازی‌الاضلاع، قطرها همدیگر را نصف می‌کنند (محل برخورد، وسط هر دو قطر است)."},{"id":8,"type":"circle_chord","question":"اگر دو کمان در دایره برابر باشند، وترهای نظیر آن‌ها...","options":["با هم برابرند.","موازی هستند.","یکی بزرگتر از دیگری است.","رابطه‌ای ندارند."],"correct":0,"explanation":"در دایره‌های هم‌نهشت یا یک دایره، کمان‌های مساوی، وترهای مساوی دارند و برعکس."},{"id":9,"type":"rhombus_angles","question":"قطرهای لوزی چه زاویه‌ای با هم می‌سازند؟","options":["۴۵ درجه","۶۰ درجه","۹۰ درجه (عمودند)","۱۸۰ درجه"],"correct":2,"explanation":"یکی از خواص مهم لوزی این است که قطرهای آن بر یکدیگر عمود هستند."},{"id":10,"type":"trapezoid_def","question":"تعریف دقیق ذوزنقه چیست؟","options":["چهارضلعی که هیچ ضلع موازی ندارد.","چهارضلعی که فقط دو ضلع موازی دارد.","چهارضلعی که ضلع‌های روبرو دو به دو موازی‌اند.","چهارضلعی که زاویه‌های روبرو برابرند."],"correct":1,"explanation":"ذوزنقه چهارضلعی است که دقیقاً یک جفت ضلع موازی داشته باشد (قاعده‌ها)."},{"id":11,"type":"isosceles_tri","question":"در مثلث متساوی‌الساقین، کدام زوایا با هم برابرند؟","options":["همه زوایا","زوایای پای ساق","زاویه رأس و یکی از زوایای پایه","هیچکدام"],"correct":1,"explanation":"در مثلث متساوی‌الساقین، زوایای روبرو به ساق‌های برابر (زوایای پای ساق) با هم مساوی هستند."},{"id":12,"type":"regular_hex","question":"اندازه هر زاویه داخلی یک شش‌ضلعی منتظم چند درجه است؟","options":["۱۰۸ درجه","۱۲۰ درجه","۱۳۵ درجه","۱۵۰ درجه"],"correct":1,"explanation":"مجموع زوایای ۶ ضلعی ۷۲۰ درجه است. تقسیم بر ۶ می‌شود: ۷۲۰/۶ = ۱۲۰ درجه."},{"id":24,"type":"triangle_sum","question":"مساحت مثلث با کدام فرمول محاسبه می‌شود؟ (b قاعده، h ارتفاع)","options":["b × h","(b × h) ÷ 2","b + h","2 × (b + h)"],"correct":1,"explanation":"مساحت مثلث برابر است با حاصل‌ضرب قاعده در ارتفاع تقسیم بر ۲."},{"id":25,"type":"triangle_sum","question":"اگر دو زاویه مکمل باشند، مجموع آن‌ها چقدر است؟","options":["۹۰ درجه","۱۸۰ درجه","۳۶۰ درجه","۲۷۰ درجه"],"correct":1,"explanation":"دو زاویه مکمل هستند اگر مجموع آن‌ها برابر با ۱۸۰ درجه باشد."},{"id":26,"type":"rhombus_angles","question":"در لوزی، قطرها چه نقشی نسبت به زاویه‌های داخلی دارند؟","options":["هیچ رابطه‌ای ندارند","آن‌ها را قطع می‌کنند ولی نصف نمی‌کنند","نیمساز زاویه‌های داخلی هستند","زاویه‌ها را به نسبت ۱ به ۲ تقسیم می‌کنند"],"correct":2,"explanation":"در لوزی، قطرها نیمساز زوایای رأس خود هستند."},{"id":27,"type":"angles_sum","question":"مجموع زوایای داخلی یک ۵ ضلعی چقدر است؟","options":["۳۶۰ درجه","۵۴۰ درجه","۷۲۰ درجه","۹۰۰ درجه"],"correct":1,"explanation":"فرمول (n-2)×180 برای ۵ ضلعی: ۳×۱۸۰ = ۵۴۰ درجه."},{"id":28,"type":"circle_chord","question":"خطی که دایره را در دو نقطه قطع می‌کند چه نام دارد؟","options":["مماس","قاطع (Secant)","شعاع","قطر"],"correct":1,"explanation":"خط قاطع خطی است که دایره را در دو نقطه متمایز قطع می‌کند. (پاره‌خط بین دو نقطه وتر نام دارد)."}],"hard":[{"id":13,"type":"circle_complex","question":"اگر فاصله یک وتر از مرکز دایره کمتر شود، طول آن وتر...","options":["کوچکتر می‌شود.","تغییری نمی‌کند.","بزرگتر می‌شود.","ابتدا بزرگ و سپس کوچک می‌شود."],"correct":2,"explanation":"هرچه وتر به مرکز دایره نزدیک‌تر باشد، طول آن بیشتر است. قطر بزرگترین وتر است (فاصله صفر)."},{"id":14,"type":"angles_sum","question":"مجموع زوایای داخلی یک ۸ ضلعی محدب چقدر است؟","options":["۷۲۰ درجه","۱۰۸۰ درجه","۱۴۴۰ درجه","۹۰۰ درجه"],"correct":1,"explanation":"فرمول: (n-2)×180. برای ۸ ضلعی: 6×180 = 1080."},{"id":15,"type":"tangent_line","question":"خط مماس بر دایره در نقطه تماس با شعاع چه زاویه‌ای می‌سازد؟","options":["۴۵ درجه","۹۰ درجه","۱۸۰ درجه","۰ درجه"],"correct":1,"explanation":"شعاع دایره در نقطه تماس بر خط مماس عمود است."},{"id":16,"type":"cyclic_quad","question":"در یک چهارضلعی محاطی، مجموع زوایای روبرو چقدر است؟","options":["۹۰ درجه","۱۸۰ درجه","۲۷۰ درجه","۳۶۰ درجه"],"correct":1,"explanation":"در هر چهارضلعی که رئوس آن روی یک دایره باشند (محاطی)، زوایای روبرو مکمل یکدیگرند (مجموع ۱۸۰)."},{"id":17,"type":"sector_area","question":"مساحت قطاعی از دایره با زاویه مرکزی ۹۰ درجه چه کسری از مساحت کل دایره است؟","options":["یک دوم","یک سوم","یک چهارم","یک ششم"],"correct":2,"explanation":"زاویه ۹۰ درجه یک چهارم زاویه کامل (۳۶۰) است، پس مساحت قطاع نیز یک چهارم مساحت دایره است."},{"id":18,"type":"inscribed_angle","question":"اندازه زاویه محاطی روبرو به یک کمان، چه رابطه‌ای با اندازه آن کمان دارد؟","options":["برابر کمان است.","نصف کمان است.","دو برابر کمان است.","یک سوم کمان است."],"correct":1,"explanation":"اندازه زاویه محاطی همواره نصف اندازه کمان روبرو به آن است."},{"id":29,"type":"circle_chord","question":"دو وتر از یک دایره که فاصله‌شان از مرکز برابر است، چه رابطه‌ای دارند؟","options":["طولشان برابر است","یکی دو برابر دیگری است","موازی هستند","بر هم عمودند"],"correct":0,"explanation":"در یک دایره، وترهای هم‌فاصله از مرکز، با هم برابرند."},{"id":30,"type":"tangent_line","question":"از یک نقطه خارج از دایره، چند خط مماس می‌توان بر دایره رسم کرد؟","options":["یک","دو","بی‌نهایت","هیچ"],"correct":1,"explanation":"از هر نقطه خارج از دایره دقیقاً دو خط مماس می‌توان بر دایره رسم کرد که طول پاره‌خط‌های مماس نیز برابر است."},{"id":31,"type":"angles_sum","question":"تعداد قطرهای یک n-ضلعی محدب با کدام فرمول محاسبه می‌شود؟","options":["n(n-3)/2","n(n-2)/2","(n-2)×180","n×n"],"correct":0,"explanation":"فرمول تعداد قطرها n(n-3)/2 است."},{"id":32,"type":"triangle_sum","question":"محل برخورد میانه‌های مثلث چه نام دارد و چه ویژگی دارد؟","options":["مرکز ارتفاعی","مرکز ثقل؛ میانه‌ها را به نسبت ۲ به ۱ تقسیم می‌کند","مرکز دایره محیطی","مرکز دایره محاطی"],"correct":1,"explanation":"محل برخورد میانه‌ها، مرکز ثقل نام دارد و هر میانه را به نسبت ۲ (از رأس) به ۱ (از قاعده) تقسیم می‌کند."},{"id":33,"type":"inscribed_angle","question":"زاویه بین مماس و وتر (زاویه ظلی) برابر است با...","options":["کمان نظیر آن","نصف کمان نظیر آن","دو برابر کمان نظیر آن","نود درجه"],"correct":1,"explanation":"اندازه زاویه ظلی (بین مماس و وتر) برابر با نصف کمان نظیر آن وتر است (مشابه زاویه محاطی)."}]};

    // --- Audio ---
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        if (type === 'success') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(500, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.1);
          gainNode.gain.setValueAtTime(0.1, ctx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
          osc.start(); osc.stop(ctx.currentTime + 0.5);
        } else if (type === 'error') {
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
          gainNode.gain.setValueAtTime(0.1, ctx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'click') {
          osc.type = 'triangle'; osc.frequency.setValueAtTime(800, ctx.currentTime);
          gainNode.gain.setValueAtTime(0.05, ctx.currentTime);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        }
      } catch (e) {}
    };

    // --- Avatar Component (Same as original) ---
    const AnimeAvatar = ({ mood }) => {
      return (
        <div className="relative w-32 h-32 mx-auto mb-4 transition-all duration-500">
          <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-lg">
            <path d="M40,80 Q20,150 50,180 L150,180 Q180,150 160,80" fill="#3b0764" />
            <path d="M50,80 Q50,160 100,170 Q150,160 150,80 Q150,20 100,20 Q50,20 50,80" fill="#ffe4c4" />
            <path d="M40,60 Q70,90 100,60 Q130,90 160,60 Q150,10 100,10 Q50,10 40,60" fill="#581c87" />
            <g transform="translate(70, 90)">{mood === 'sad' ? <path d="M0,5 Q10,0 20,5" stroke="#333" strokeWidth="3" fill="none" /> : <ellipse cx="10" cy="5" rx="8" ry="10" fill="#1e1b4b" />}</g>
            <g transform="translate(110, 90)">{mood === 'sad' ? <path d="M0,5 Q10,0 20,5" stroke="#333" strokeWidth="3" fill="none" /> : <ellipse cx="10" cy="5" rx="8" ry="10" fill="#1e1b4b" />}</g>
            <g transform="translate(100, 120)">{mood === 'happy' ? <path d="M-10,-5 Q0,10 10,-5" fill="#db2777" /> : mood === 'sad' ? <path d="M-10,5 Q0,-5 10,5" stroke="#333" strokeWidth="2" fill="none" /> : <path d="M-5,0 Q0,5 5,0" stroke="#333" strokeWidth="2" fill="none" />}</g>
            <circle cx="65" cy="110" r="8" fill="#f472b6" opacity="0.4" />
            <circle cx="135" cy="110" r="8" fill="#f472b6" opacity="0.4" />
          </svg>
        </div>
      );
    };

    // --- Visualizer (Simplified for template) ---
    const GeometryVisualizer = ({ type, animate }) => {
      const pulseClass = animate ? "animate-pulse" : "";
      let content = null;
      if (type === 'convex' || type === 'regular_hex' || type === 'angles_sum') {
        content = <><polygon points="50,120 20,60 60,10 140,10 180,60 150,120" fill="rgba(139, 92, 246, 0.2)" stroke="#c084fc" strokeWidth="3" className={pulseClass} /><circle cx="50" cy="120" r="3" fill="#f472b6" /><circle cx="20" cy="60" r="3" fill="#f472b6" /><circle cx="60" cy="10" r="3" fill="#f472b6" /><circle cx="140" cy="10" r="3" fill="#f472b6" /><circle cx="180" cy="60" r="3" fill="#f472b6" /><circle cx="150" cy="120" r="3" fill="#f472b6" /></>;
      } else if (type === 'parallelogram_basic' || type === 'parallelogram_diag' || type === 'rhombus_angles' || type === 'square_props' || type === 'rectangle_diag' || type === 'trapezoid_def') {
        const isRect = type === 'rectangle_diag' || type === 'square_props';
        const points = isRect ? "30,110 30,40 170,40 170,110" : "50,120 20,40 120,40 150,120";
        content = <><polygon points={points} fill="rgba(56, 189, 248, 0.2)" stroke="#38bdf8" strokeWidth="3" />{(type === 'parallelogram_diag' || type === 'rectangle_diag' || type === 'rhombus_angles' || animate) && <><line x1={isRect?30:50} y1="120" x2={isRect?170:120} y2="40" stroke="#f472b6" strokeWidth="2" strokeDasharray="5,5" /><line x1={isRect?30:20} y1="40" x2={isRect?170:150} y2="120" stroke="#f472b6" strokeWidth="2" strokeDasharray="5,5" /><circle cx={isRect?100:85} cy={80} r="4" fill="#fff" className={animate ? "animate-ping" : ""} /></>}</>;
      } else if (type === 'triangle_sum' || type === 'isosceles_tri') {
         content = <><polygon points="100,20 40,120 160,120" fill="rgba(16, 185, 129, 0.2)" stroke="#34d399" strokeWidth="3" />{animate && <><text x="100" y="80" textAnchor="middle" fill="#fff">180°</text><circle cx="40" cy="120" r="4" fill="#f472b6" /><circle cx="160" cy="120" r="4" fill="#f472b6" /></>}</>;
      } else {
         content = <><circle cx="100" cy="75" r="50" fill="rgba(236, 72, 153, 0.1)" stroke="#ec4899" strokeWidth="3" /><circle cx="100" cy="75" r="3" fill="#fff" />{type === 'tangent_line' && <><line x1="100" y1="75" x2="100" y2="125" stroke="#fff" strokeWidth="2" /><line x1="40" y1="125" x2="160" y2="125" stroke="#facc15" strokeWidth="3" /></>}</>;
      }
      return <svg viewBox="0 0 200 150" className="w-full h-48 drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">{content}</svg>;
    };

    function App() {
      const [screen, setScreen] = useState('menu');
      const [level, setLevel] = useState('easy');
      const [qIndex, setQIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [showFeedback, setShowFeedback] = useState(false);
      const [isCorrect, setIsCorrect] = useState(false);
      const [avatarMood, setAvatarMood] = useState('normal');
      
      const currentQuestions = QUESTIONS[level];
      const currentQ = currentQuestions[qIndex];

      useEffect(() => { if (!showFeedback) setAvatarMood('normal'); }, [showFeedback, qIndex]);

      const handleStart = (l) => { playSound('click'); setLevel(l); setScreen('game'); setQIndex(0); setScore(0); setAvatarMood('normal'); setShowFeedback(false); };
      const handleAnswer = (idx) => {
        if (showFeedback) return;
        const correct = idx === currentQ.correct;
        setIsCorrect(correct); setShowFeedback(true);
        if (correct) { playSound('success'); setScore(s => s + 10); setAvatarMood('happy'); }
        else { playSound('error'); setAvatarMood('sad'); }
      };
      const nextQuestion = () => { playSound('click'); setShowFeedback(false); if (qIndex < currentQuestions.length - 1) setQIndex(qIndex + 1); else setScreen('result'); };
      const restartGame = () => { playSound('click'); setScreen('menu'); };

      if (screen === 'menu') {
        return (
          <div dir="rtl" className="min-h-screen w-full bg-gradient-to-br from-indigo-950 via-purple-900 to-slate-900 flex items-center justify-center p-4 font-sans text-white">
            <div className="max-w-md w-full bg-white/10 backdrop-blur-lg rounded-3xl p-8 border border-white/20 shadow-[0_0_30px_rgba(168,85,247,0.4)] text-center relative overflow-hidden">
              <AnimeAvatar mood="happy" />
              <h1 className="text-4xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-cyan-400">چالش هندسی</h1>
              <p className="text-blue-200 mb-8">نسخه آفلاین</p>
              <div className="space-y-4">
                <button onClick={() => handleStart('easy')} className="w-full bg-gradient-to-r from-emerald-500 to-emerald-700 text-white p-4 rounded-2xl font-bold flex justify-between"><span className="flex gap-2"><Star size={20}/> سطح ساده</span><ChevronRight /></button>
                <button onClick={() => handleStart('medium')} className="w-full bg-gradient-to-r from-blue-500 to-blue-700 text-white p-4 rounded-2xl font-bold flex justify-between"><span className="flex gap-2"><RefreshCw size={20}/> سطح متوسط</span><ChevronRight /></button>
                <button onClick={() => handleStart('hard')} className="w-full bg-gradient-to-r from-pink-600 to-purple-700 text-white p-4 rounded-2xl font-bold flex justify-between"><span className="flex gap-2"><Award size={20}/> سطح سخت</span><ChevronRight /></button>
              </div>
            </div>
          </div>
        );
      }
      
      if (screen === 'game') {
        return (
          <div dir="rtl" className="min-h-screen w-full bg-gradient-to-br from-indigo-950 via-purple-900 to-slate-900 flex flex-col items-center justify-start p-4 font-sans text-white">
            <div className="w-full max-w-2xl flex justify-between items-center mb-6 bg-white/5 p-4 rounded-2xl border border-white/10 backdrop-blur-sm">
               <div className="flex items-center gap-2"><div className="bg-pink-500/20 p-2 rounded-lg text-pink-300">{level==='easy'?'ساده':level==='medium'?'متوسط':'سخت'}</div><span>سوال {qIndex+1}</span></div>
               <div className="flex items-center gap-2 bg-yellow-500/10 px-4 py-2 rounded-full border border-yellow-500/30"><Star className="text-yellow-400 fill-yellow-400" size={18} /><span className="font-bold text-yellow-100">{score}</span></div>
            </div>
            <div className="w-full max-w-2xl grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
              <div className="space-y-4">
                <div className="bg-white/10 backdrop-blur-md border-2 border-cyan-500/30 rounded-3xl p-6 shadow-xl"><p className="text-lg font-medium">{currentQ.question}</p></div>
                <div className="bg-black/30 rounded-2xl p-4 flex justify-center"><GeometryVisualizer type={currentQ.type} animate={showFeedback && isCorrect} /></div>
              </div>
              <div className="flex flex-col gap-3">{currentQ.options.map((opt, i) => (
                <button key={i} onClick={() => handleAnswer(i)} disabled={showFeedback} className={`w-full p-4 rounded-xl border text-right transition-all ${showFeedback ? (i===currentQ.correct ? "bg-green-500/20 border-green-500" : "bg-white/5 opacity-50") : "bg-white/5 hover:bg-white/10 border-white/10"}`}>
                  <div className="flex items-center gap-3"><span className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center font-bold">{i+1}</span><span>{opt}</span></div>
                </button>
              ))}</div>
            </div>
            {showFeedback && <div className="fixed bottom-0 left-0 right-0 p-6 bg-slate-900/95 backdrop-blur-xl border-t border-white/10 z-50"><div className="max-w-2xl mx-auto flex flex-col md:flex-row items-center gap-6"><div className="flex-1 text-center md:text-right"><h3 className={`text-xl font-bold ${isCorrect?'text-green-400':'text-red-400'}`}>{isCorrect?'درسته!':'اشتباه بود.'}</h3><p className="text-slate-300">{currentQ.explanation}</p></div><button onClick={nextQuestion} className="px-8 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-bold flex items-center gap-2">{qIndex < currentQuestions.length - 1 ? 'بعدی' : 'نتیجه'}<ChevronRight /></button></div></div>}
          </div>
        );
      }

      if (screen === 'result') {
        return (
           <div dir="rtl" className="min-h-screen w-full bg-gradient-to-br from-indigo-950 via-purple-900 to-slate-900 flex items-center justify-center p-4 font-sans text-white">
             <div className="max-w-md w-full bg-white/10 backdrop-blur-lg rounded-3xl p-8 border border-white/20 text-center">
               <AnimeAvatar mood="happy" /><h2 className="text-3xl font-bold mb-2">پایان!</h2><div className="text-6xl font-bold mb-2">{score}</div>
               <button onClick={restartGame} className="w-full mt-6 bg-white text-indigo-900 py-4 rounded-xl font-bold flex justify-center gap-2"><RefreshCw size={20}/> شروع مجدد</button>
             </div>
           </div>
        );
      }
      return null;
    }
    
    createRoot(document.getElementById('root')).render(<App />);
  
  </script>
</body>
</html>
